<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobSimply Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1>JobSimply Settings</h1>
    
    <div class="section">
      <h2>General</h2>
      <label>
        <input type="checkbox" id="auto-analyze" />
        Auto-analyze job pages
      </label>
      <label>
        <input type="checkbox" id="notifications" />
        Enable notifications
      </label>
    </div>

    <div class="section">
      <h2>API Configuration</h2>
      <label>Backend URL</label>
      <input type="text" id="backend-url" placeholder="http://localhost:5000" value="http://localhost:5000" />
    </div>

    <div class="section">
      <h2>Default Tone</h2>
      <select id="default-tone">
        <option value="professional">Professional</option>
        <option value="confident">Confident</option>
        <option value="creative">Creative</option>
        <option value="concise">Concise</option>
      </select>
    </div>

    <div class="section">
      <h2>Profile Information</h2>
      <p class="info-text">Your profile is used for autofill. Complete it to enable one-click form filling.</p>
      
      <label>First Name</label>
      <input type="text" id="first-name" placeholder="John" />
      
      <label>Last Name</label>
      <input type="text" id="last-name" placeholder="Doe" />
      
      <label>Email</label>
      <input type="email" id="email" placeholder="john@example.com" />
      
      <label>Phone</label>
      <input type="tel" id="phone" placeholder="+1 234 567 8900" />
      
      <label>Address</label>
      <input type="text" id="address" placeholder="123 Main St" />
      
      <label>City</label>
      <input type="text" id="city" placeholder="New York" />
      
      <label>State</label>
      <input type="text" id="state" placeholder="NY" />
      
      <label>Country</label>
      <input type="text" id="country" placeholder="USA" />
      
      <label>Zip</label>
      <input type="text" id="zip" placeholder="10001" />
      
      <label>LinkedIn</label>
      <input type="url" id="linkedin" placeholder="https://linkedin.com/in/..." />
      
      <label>GitHub</label>
      <input type="url" id="github" placeholder="https://github.com/..." />
      
      <label>Portfolio</label>
      <input type="url" id="portfolio" placeholder="https://yourportfolio.com" />
      
      <label>Current Company</label>
      <input type="text" id="current-company" placeholder="Current Company" />
      
      <label>Designation</label>
      <input type="text" id="designation" placeholder="Software Engineer" />
      
      <button id="save-profile-btn" class="btn secondary">Save Profile</button>
    </div>

    <button id="save-btn" class="btn">Save Settings</button>
    <p id="status" class="status"></p>
  </div>

  <script src="options.js"></script>
</body>
</html>
